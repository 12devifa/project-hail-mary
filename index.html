<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Eridian Mission Log | Portafolio Devin</title>
<style>
  :root{
    --bg-1:#02040a;
    --bg-2:#03111a;
    --neon: #58ffd6;
    --neon-2: #b7ff5a;
    --glass-border: rgba(255,255,255,0.12);
    --mono: ui-monospace, SFMono-Regular, "SF Mono", "Roboto Mono", monospace;
  }

  html,body{
    height:100%; margin:0; font-family: var(--mono);
    background: linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 100%);
    color: #dfffee; display: flex; justify-content: center; align-items: center; overflow: hidden;
  }

  /* Fondo de Estrellas */
  body::before {
    content: ""; position: fixed; inset: 0;
    background-image: radial-gradient(1px 1px at 10% 20%, white, transparent), radial-gradient(1.5px 1.5px at 50% 50%, white, transparent);
    background-size: 250px 250px; opacity: 0.2;
  }

  .card{
    width: min(900px, 95vw); border-radius: 14px; padding: 30px;
    background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border);
    backdrop-filter: blur(15px); position: relative;
    box-shadow: 0 20px 50px rgba(0,0,0,0.8); z-index: 1;
  }

  .title{ 
    font-size: 32px; color: var(--neon); margin-bottom: 5px; font-weight: 800; 
    letter-spacing: 2px; text-shadow: 0 0 10px rgba(88,255,214,0.3);
  }
  
  .title:hover { animation: glitch 0.3s infinite; }

  .form{ display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px;}
  .field{ background: rgba(0,0,0,0.4); padding: 12px; border-radius: 8px; border: 1px solid rgba(88,255,214,0.1); }
  label{ font-size: 9px; color: var(--neon); display: block; margin-bottom: 5px; opacity: 0.7; }
  input{ background: transparent; border: none; color: white; width: 100%; outline: none; font-family: var(--mono); font-size: 15px; }

  .actions{ display: flex; gap: 15px; margin: 25px 0; }
  .btn{ 
    padding: 12px 25px; border-radius: 8px; border: 1px solid var(--neon);
    background: rgba(88,255,214,0.05); color: var(--neon); cursor: pointer; font-weight: bold;
    transition: all 0.3s; font-family: var(--mono);
  }
  .btn:hover:not(:disabled) { background: var(--neon); color: black; box-shadow: 0 0 20px var(--neon); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; border-color: #444; color: #444; }

  .outputs{ display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .screen-label { font-size: 10px; margin-bottom: 8px; color: rgba(255,255,255,0.4); }
  .screen{ 
    background: rgba(0,0,0,0.6); padding: 20px; border-radius: 10px; 
    border: 1px solid rgba(88,255,214,0.15); min-height: 160px; font-size: 14px;
    line-height: 1.6; position: relative;
  }
  .screen.rocky{ color: var(--neon-2); border-color: rgba(183,255,90,0.15); }

  /* El Cursor */
  .cursor {
    display: inline-block; width: 8px; height: 15px;
    background: currentColor; margin-left: 4px;
    animation: blink 1s infinite; vertical-align: middle;
  }

  @keyframes blink { 50% { opacity: 0; } }
  @keyframes glitch {
    0% { transform: translate(0); }
    25% { transform: translate(-2px, 2px); }
    50% { transform: translate(2px, -2px); }
    100% { transform: translate(0); }
  }
</style>
</head>
<body>

<div class="card">
  <div class="title">ERIDIAN MISSION LOG</div>
  <div class="subtitle" style="font-size: 12px; opacity: 0.6;">Proyecto Final: Inteligencia Artificial Aplicada</div>

  <div class="form">
    <div class="field"><label>OBJETO ESTELAR</label><input type="text" id="obj" placeholder="Tau Ceti"></div>
    <div class="field"><label>VELOCIDAD</label><input type="text" id="vel" placeholder="0.93c"></div>
    <div class="field"><label>CONSTANTE</label><input type="text" id="const" placeholder="Luz Petrova"></div>
    <div class="field"><label>ANOMALÍA</label><input type="text" id="anom" placeholder="Crítica"></div>
  </div>

  <div class="actions">
    <button id="mainBtn" class="btn" onclick="generate()">GENERAR REPORTE</button>
    <button class="btn" style="border-color: #444; color: #666;" onclick="loadData()">CARGAR DATOS</button>
  </div>

  <div class="outputs">
    <div>
      <div class="screen-label">DR. GRACE REPORT</div>
      <div class="screen" id="outMain">Esperando conexión...</div>
    </div>
    <div>
      <div class="screen-label">ROCKY ANALYSIS</div>
      <div class="screen rocky" id="outRocky">A espera de compañero...</div>
    </div>
  </div>
</div>

<script>
  function loadData() {
    document.getElementById('obj').value = "Sistema Tau Ceti";
    document.getElementById('vel').value = "0.93c (Relativista)";
    document.getElementById('const').value = "Frecuencia Luz Petrova";
    document.getElementById('anom').value = "Crítica (Astrofagos)";
  }

  async function typeEffect(element, text) {
    element.innerHTML = "";
    const cursor = document.createElement("span");
    cursor.className = "cursor";
    
    for (let i = 0; i <= text.length; i++) {
      element.innerHTML = text.substring(0, i);
      element.appendChild(cursor);
      await new Promise(res => setTimeout(res, Math.random() * 30 + 15));
    }
  }

  async function generate() {
    const btn = document.getElementById('mainBtn');
    btn.disabled = true;

    const obj = document.getElementById('obj').value || "Espacio Profundo";
    const vel = document.getElementById('vel').value || "0.00c";
    const cnst = document.getElementById('const').value || "Física";
    const anom = document.getElementById('anom').value || "Nominal";

    const graceText = `REGISTRO: Aproximación a ${obj} a ${vel}.\nVariación en ${cnst} detectada.\nEstado de anomalía: ${anom}.\nLa Tierra espera resultados.`;
    const rockyText = `Rocky dice: ¡Asombro! ¡${obj} es luz grande!\n¿Grace asustado? No asustado, yo aquí.\n¿Amenaza ${anom}? ¡Mal! Nosotros arreglamos. ¡Choque de puños! 👊`;

    await Promise.all([
      typeEffect(document.getElementById('outMain'), graceText),
      typeEffect(document.getElementById('outRocky'), rockyText)
    ]);

    btn.disabled = false;
  }
</script>

</body>
</html>

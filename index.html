<div style="text-align: right; margin-bottom: 10px;">
  <button class="btn" onclick="setLanguage('en')" style="padding: 5px 10px; font-size: 10px;">ENGLISH</button>
  <button class="btn" onclick="setLanguage('es')" style="padding: 5px 10px; font-size: 10px;">ESPAÑOL</button>
</div>

<script>
  let currentLang = 'es'; // Por defecto español, como te gusta

  const translations = {
    en: {
      title: "ERIDIAN MISSION LOG",
      subtitle: "Final Project: Applied Artificial Intelligence",
      labels: ["STELLAR OBJECT", "VELOCITY", "CONSTANT", "ANOMALY"],
      btns: ["GENERATE LOG", "LOAD DATA"],
      screens: ["DR. GRACE REPORT", "ROCKY ANALYSIS"],
      wait: "Waiting...",
      grace: (obj, vel, cnst, anom) => `LOG: Approaching ${obj} at ${vel}.\n${cnst} variance detected.\nStatus: ${anom}.\nEarth is waiting.`,
      rocky: (obj, anom) => `Rocky looks: Amaze! ${obj} is big light!\nYou watch, I do. Grace scared? No scared, I here.\n${anom} threat? Bad! We fix! Fist bump! 👊`
    },
    es: {
      title: "REGISTRO DE MISIÓN",
      subtitle: "Proyecto Final: Inteligencia Artificial Aplicada",
      labels: ["OBJETO ESTELAR", "VELOCIDAD", "CONSTANTE", "ANOMALÍA"],
      btns: ["GENERAR REPORTE", "CARGAR DATOS"],
      screens: ["REPORTE DR. GRACE", "ANÁLISIS DE ROCKY"],
      wait: "Esperando...",
      grace: (obj, vel, cnst, anom) => `REGISTRO: Aproximación a ${obj} a ${vel}.\nVariación en ${cnst} detectada.\nEstado: ${anom}.\nLa Tierra espera resultados.`,
      rocky: (obj, anom) => `Rocky dice: ¡Asombro! ¡${obj} es luz grande!\n¿Grace asustado? No asustado, yo aquí.\n¿Amenaza ${anom}? ¡Mal! Nosotros arreglamos. ¡Choque de puños! 👊`
    }
  };

  function setLanguage(lang) {
    currentLang = lang;
    const t = translations[lang];
    document.querySelector('.title').innerText = t.title;
    document.querySelector('.subtitle').innerText = t.subtitle;
    // Actualiza etiquetas y botones... (el código completo manejará esto)
    document.getElementById('outMain').innerText = t.wait;
    document.getElementById('outRocky').innerText = t.wait;
  }
  
  // Tu función generate ahora usará currentLang para decidir qué texto mostrar
</script>
